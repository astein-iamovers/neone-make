services:
    ne-one-view:
        image: git.openlogisticsfoundation.org:5050/wg-digitalaircargo/ne-one-view:dev
        ports:
            - "3000:3000"
        environment:
            - NUXT_PUBLIC_API_BASE=http://localhost:8080
        depends_on:
            ne-one-server:
                condition: service_healthy

    ne-one-server:
        image: git.openlogisticsfoundation.org:5050/wg-digitalaircargo/ne-one:dev
        ports:
            - "8080:8080"
        volumes:
            - ./rdf_data:/data/rdf_data
        healthcheck:
            test: curl --fail http://${HOST}:8080/q/health || exit 1
            interval: 5s
            timeout: 5s
            retries: 10            
        environment:
            - REPOSITORY_TYPE=in-memory
            - REPOSITORY_DATA_DIR=/data/rdf_data
            - LO_ID_CONFIG_HOST=${HOST}
            - LO_ID_CONFIG_PORT=8080
            - LO_ID_CONFIG_SCHEME=http
            - AUTH_VALID_ISSUERS_LOCAL=${AUTH_SERVER}/
            - QUARKUS_OIDC_AUTH_SERVER_URL=${AUTH_SERVER}
            - AUTH_ISSUERS_LOCAL_PUBLICKEY_LOCATION=${AUTH_SERVER}/.well-known/jwks.json
            - QUARKUS_OIDC_CLIENT_AUTH_SERVER_URL=${AUTH_SERVER}
            - QUARKUS_OIDC_CLIENT_CLIENT_ID=${CLIENT_ID}
            - QUARKUS_OIDC_CLIENT_CREDENTIALS_SECRET=${CLIENT_SECRET}
            - QUARKUS_HTTP_PORT=8080           
            - QUARKUS_REDIS_HOSTS=redis://localhost:6379
            - ACTION_REQUEST_EVALUATION_INTERVAL=10s
            - AUTO_ACCEPT_ACTION_REQUESTS=true
            - BLOBSTORE_CREATE_BUCKET=false
            - QUARKUS_HTTP_CORS=true
            - QUARKUS_HTTP_CORS_ORIGINS=/.*/
            - QUARKUS_HTTP_CORS_EXPOSED_HEADERS=location,revision,latest-revision,type
            - FORWARD_NOTIFICATIONS=true
            - NOTIFICATION_SEND_INTERVAL=10s
            - QUARKUS_REST_CLIENT_SUBSCRIPTION_CLIENT_URL=${NOTIFICATION_ENDPOINT}
            - QUARKUS_REST_CLIENT_NOTIFICATION_CLIENT_URL=${NOTIFICATION_ENDPOINT}
            - QUARKUS_REST_CLIENT_ACTION_REQUEST_CLIENT_URL=${NOTIFICATION_ENDPOINT}
            - QUARKUS_LOG_MIN_LEVEL=DEBUG
            - JAVA_OPTS=-Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager -Dquarkus.oidc-client.grant-options.client.audience=${AUDIENCE}
 
  notification-forwarder:
    build:
      context: .  # Use the current directory as the build context for the Flask app
      dockerfile: Dockerfile  # Specify the Dockerfile for building the Flask app image
    ports:
      - "5000:5000"  # Map host port 5000 to container port 5000 for external access
    env_file: .env  # Load environment variables from the .env file
    volumes:
      - "./notifications:/app/notifications"  # Map the host notifications folder to the container's /app/notifications directory
      - "./events:/app/events"  # Map the host events folder to the container's /app/events directory
